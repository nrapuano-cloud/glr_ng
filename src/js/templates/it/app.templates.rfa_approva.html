    <div class="panel panel-default">
    <div class="panel-heading">RFA > Richiesta valutazione ordine  <label id="headRichiesta"></label></div>
        <div class="panel-body">
           
            <span class="alert"></span>
            <div class="messages"></div>
            <div class="form-group row text-center">
                <label class="text-center">Definizione Fabbisogno di Fornitura <strong style="color:#FF0000">CON</strong> richiesta di approvazione</label>
            </div>
            <div class="form-group row">
                <div class="col-sm-12"> 
                    <label for="servizio">Servizio</label>

                    <input type="text" id="servizio" name="servizio" class="form-control" readonly>
                </div>
            </div>
            <div class="form-group row">
                <div class="col-sm-12"> 
                    <label for="fornitore">Fornitore</label>

                    <input type="text" id="fornitore" name="fornitore" class="form-control" readonly>
                </div>
            </div>
            <div id="prodotti">
                <div class="form-group row">
                    <div class="col-sm-2">
                        <label for="codice">Codice</label>
                        <input type="text" id="codice" name="codice" class="form-control" readonly>
                    </div>
                    <div class="col-sm-9">  
                        <label for="prodotto">Descrizione prodotto *</label>
                        <input type="text" id="prodotto" name="prodotto" class="form-control" readonly>
                    </div>  
                    <div class="col-sm-1"> 
                        <label for="quantita">Q.tà *</label>
                        <input type="text" id="quantita" name="quantita" class="form-control" readonly>
                    </div>
                </div>
            </div>    
            <div class="form-group row">
                <div class="col-sm-12"> 
                    <label for="nota">Nota</label>

                    <input type="text" id="nota" name="nota" class="form-control" readonly>
                </div>
            </div>
            <div id="servizi"></div>
            <table id="table">        
    </table>
         
        </div>  <!--div class="panel-body"-->
    </div>  <!--div class="panel panel-default"-->
    <br>
   
    <div class="panel panel-default">
    <div class="panel-heading">RFA > Valutazione cordinatore <label id="headCoord"></label></div>
        <div class="panel-body">
             <form id="approvaForm" name="approvaForm">
                <input type="hidden" id="tokenKey" name="tokenKey" >
                 <input type="hidden" id="id_ordine" name="id_ordine" >
            <span class="alert1"></span>
            <div class="messages"></div>
          <!-- Group of default radios - option 1 -->
            <div class="custom-control custom-radio">
              <input type="radio" class="custom-control-input" id="approva" name="approva" value="si">
              <label class="custom-control-label" >Approva</label>
            </div>

            <!-- Group of default radios - option 2 -->
            <div class="custom-control custom-radio">
              <input type="radio" class="custom-control-input" id="approva" name="approva" value="no" checked>
              <label class="custom-control-label" for="defaultGroupExample2"><strong style="color:#FF0000">NON Approva</strong></label>
            </div>

            <div class="form-group row">
                <div class="col-sm-12"> 
                    <label for="motivazione">Motivazione *</label>

                    <textarea  id="motivazione" name="motivazione" class="form-control"  rows="5"></textarea>
                </div>
            </div>
             <div class="form-group row">
                <div class="form-group col-sm-6"> 
                    <button type="submit"  class="btn btn-primary submit btn-block">Submit</button>
                </div>
                <div class="form-group col-sm-6">
                    <button type="button"  class="btn btn-danger col-lg-6 btn-block" onclick="window.location.reload();"><span aria-hidden="true">&times;</span> Annulla</button>
                </div>
            </div>
             </form>  
        </div>  <!--div class="panel-body"-->
    </div>  <!--div class="panel panel-default"-->

    <div id="modal" class="modal fade">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title"></h4>
                </div>
                <div class="modal-body">
                     <h3 id="myModalLabel"></h3>
                   <textarea class="form-control" name="descriz" id="descriz" readonly rows="3"></textarea>
                   <img   class="img-fluid" id="image"> 
                </div>
                <div class="modal-footer">
                   
                   
                </div>
                
            </div><!-- /.modal-content -->
        </div><!-- /.modal-dialog -->
    </div><!-- /.modal -->
