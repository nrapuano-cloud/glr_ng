<h3 id="h3" style="text-align: center;color:black;font-weight:bold;border:2px solid #a1a1a1;">CATEGORIA  </h3><br>
<form  id="edit">
    <div class="messages"></div>
   
     
    <div id="step1">          
        <div class="row" id="step1_1">
            <div class="form-group col-sm-6">
                <label id="lab">Categoria *</label>
                <input type="text"   class="form-control" name="descrizione" id="descrizione"  placeholder="Categoria"/>
             </div>
             <div class="form-group col-sm-6">
                <label >Etichetta</label>
                <input type="text"   class="form-control" name="etichetta" id="etichetta"  placeholder="Etichetta" oninput="this.value = this.value.toUpperCase()"/>
             </div>
            
        </div> 
    <div id="pre_sub"> 
        <div class="panel panel-default" id="sub">
            <div class="panel-heading"><h3>Sotto Categorie</h3></div>
            <div class="panel-body">
                <div id="list"></div> 
                <p class="toolbar">
                    <a class="create btn btn-default" >Nuova Sotto Categoria</a>
                </p>   
                <table id="table" class="table table-striped"
                data-show-refresh="false"
                data-show-columns="true"
                data-search="true"
                data-cache="false"
                data-pagination="true">
            </table>
            </div> 
            </div> 
        </div>     
        <label >    * Campi obbligatori</label>
        <span class="alert1"></span>
        <br>
        <br>
        <button type="button"  class="btn btn-info  btn-block btn-large" id="invio"  name="invio"  value="Invio" >Invio</button>
        
    
    </div>
    <div id="step2">

    </div>
    <div id="step3">

    </div>
   

</form>
