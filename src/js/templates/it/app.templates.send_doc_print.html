

<div class="container">
    <br/><br/><br/>
    <div class="row">
        <div class="col-lg-12">
            <ol class="breadcrumb"></ol>
        </div>
    </div>
    
 

    <div class="panel panel-default">
  
        <div class="panel-body">
   
            <div class="row">
                <div class="col-lg-12">


                    <form  id="form" class="well"  method="post" enctype="multipart/form-data">
                        
                        <div class="form-group">
                            <label >Seleziona la tempistica:   </label></br>
                            <div class="radio-inline">
                                <label><input type="radio" value="1" name="week" checked>Entro 1 settimana</label>
                            </div>
                            <div class="radio-inline">
                              <label><input type="radio" value="2" name="week">Entro 2 settimane</label>
                            </div>
                        </div>
                     
                        <div class="form-group "> 
                           <div class="row">
                                <div class="col-md-2 pull-left">
                                    <label class="control-label" >Numero copie: </label> 
                                </div>
                                <div class="col-md-2">
                                    <input type="text"  name="copie" id="copie" value="1"   placeholder="Numero copie"/>
                                </div>
                            </div>
                        </div>
                       </br></br>
                        
                        <div class="form-group col-lg-12">
                            <label for="file">Seleziona il file da inviare: </label>
                            <input type="file" name="file" id="file" accept="application/vnd.oasis.opendocument.text,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,application/zip,image/*,video/*,application/vnd.ms-powerpoint">
                            <p class="help-block"></p>
                        </div>
                        <div id="preview">
                            <img id="blah" src="../../../css\img\filed.png" />
                        </div>
                        <br>
                        <input type="submit" id="invio" class="btn btn-lg btn-primary" value="Invia">
                    </form>
                    <div class="progress"></div>
                    <div id="err"></div>
                </div>
            </div>
    
        </div> 
    </div>
</div>
