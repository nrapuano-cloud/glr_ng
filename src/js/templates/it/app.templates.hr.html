
<div class="container-fluid">

                         <div class="form-group col-sm-4">

                           <button type="button" class="btn btn-default form-control genPw" name="genPw" id="genPw">Genera</button>

            '<!--a class="create_user" href="javascript:" title="Crea User Web"><i class="glyphicon glyphicon-user"></i></a-->&emsp;&emsp;',
