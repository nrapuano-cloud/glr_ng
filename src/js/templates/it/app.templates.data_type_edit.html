
<div class="container-fluid">
  

    <style>
        .add {
            color: #333;
            margin-right: 5px;
        }
        .update {
            color: #333;
            margin-right: 5px;
        }
        .remove {
            color: red;
            margin-left: 5px;
        }
        .remove.btn-danger {
            color: #333;
            margin-left: 5px;
        }
        .remove.btn-danger:hover {
            color: white;
           
        }
        
        .alert {
            padding: 0 14px;
            margin-bottom: 0;
            display: inline-block;
        }
    </style>
    <br/><br/><br/>
    <div class="row">
        <div class="col-lg-12">
            <ol class="breadcrumb"></ol>
        </div>
    </div>

    <div class="panel panel-default" id="pdefault">
    <div class="panel-heading"></div>
        <div class="panel-body">
             <span class="alert"></span>
            <p class="toolbar">
                <a class="create btn btn-default" href="javascript:">Nuovo</a>
               
            </p>
            <div id="tipoServizio"></div>
            <table id="table1"
                data-show-refresh="true"
                data-show-columns="true"
                data-search="true"
                data-cache="false"
                data-toolbar=".toolbar"
               data-pagination="true"
                data-query-params-type="limit"
              
                class="table table-striped"
        >
        <!--table id="table1" class="table table-striped"-->
                <thead>
                    <tr>
                        <th data-field="id" data-sortable="true">ID</th>
                        <th data-field="name" data-sortable="true">Nome</th>
                        <th data-field="description" >Descrizione</th>
                        <th data-field="shortDescription" >Descrizione breve</th>
                        <th data-field="valid" data-sortable="true">Valido</th>

                        <th data-field="action"
                            data-align="center"
                            data-formatter="actionFormatter"
                            data-events="actionEvents">Action</th>
                    </tr>
                </thead>
            </table>
         <div id="html_contents"></div>
        </div>  <!--div class="panel-body"-->
    </div>  <!--div class="panel panel-default"-->
 

    <div id="modal" class="modal fade">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title"></h4>
                </div>
                <div class="modal-body">
                     <form role="form" id="newModalForm" name="newModalForm" enctype="multipart/form-data">
                        <input type="hidden" class="form-control" name="id" > 
                        <div class="form-group">
                           <label>Nome</label>
                           <input type="text" class="form-control" name="name" id="name" placeholder="Nome" >
                        </div>
                        <div class="form-group">
                            <label  id="lbldescription" for="description">Comune</label>
                            <input type="text" class="form-control" name="description" id="description" placeholder="Comune">
                        </div>
                        <div class="form-group">
                            <label id="lblshortDescription" for="shortDescription">Cartella</label>
                            <input type="text" class="form-control" name="shortDescription" id="shortDescription" placeholder="Nome Cartella">
                        </div>

                        <div class="input_fields_wrap"> 
                        </div>    

                        <div class="form-group">
                          <label>Valido</label>
                          <input type="checkbox" class="form-control" name="valid" placeholder="Valido" value="">
                        </div>
                         <!--button type="button" class="btn btn-primary submit">Submit</button>
                         <button type="button" class="btn btn-default" data-dismiss="modal">Close</button-->
                     </form>
                </div><!-- /.modal-body -->
                <div class="modal-footer">
                    <button type="submit"  class="btn btn-primary submit">Submit</button>
                    <button type="button" class="btn btn-default" data-dismiss="modal">Close</button> 
                   
                </div>
                
            </div><!-- /.modal-content -->
        </div><!-- /.modal-dialog -->
    </div><!-- /.modal -->
 </div><!-- content -->

<script type="text/javascript">

    function actionFormatter(value) {
        return [
            '<a class="setEmail" href="javascript:" title="Set Email"><i class="fas fa-envelope-open-text"></i></a>&ensp;&ensp;',
            '<a class="update" href="javascript:" title="Update Item"><i class="glyphicon glyphicon-edit"></i></a>',
            '<a class="remove" href="javascript:" title="Delete Item"><i class="glyphicon glyphicon-remove-circle"></i></a>'
        ].join('');
    }
</script>
