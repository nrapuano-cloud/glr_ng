<!-- Richiesta Nuovo Ordine -->
<div class="container">


<style>
        .update {
            color: #333;
            margin-right: 5px;
        }
        .remove {
            color: red;
            margin-left: 5px;
        }
        .alert {
            padding: 0 14px;
            margin-bottom: 0;
            display: inline-block;
        }
  </style>
   <br/><br/><br/>

  
 
    <div class="row">
        <div class="col-lg-12">
            <ol class="breadcrumb"></ol>
        </div>
    </div>
  <P class="toolbar1">
    <span class="alert"></span>
  </p>
  
    <div class="row">
        <div class="col-lg-12">
            <h3 class="lead">Nuovo Ordine </h3>
             
               
                <br>
            <form class="well" id="richiestaOrdineForm" method="post" enctype="multipart/form-data">
           
                <div class="messages"></div>
        
                <fieldset>
                    
                    <input type="hidden" id="id_person" name="id_person" >
                    <div id="servizi"></div>
                       
                    <label for="tipo">Tipologia Fornitura *</label><select  id="tipo" name="tipo"  class="form-control" ></select><br>
                    <br/>
                    <div id="fornitori"></div>
                    <div id="orario"></div>
                    <div id="link_indicazione"></div>
                    <div id="prodotti"></div>
                    <br> 
                   
                    <br> 
                    <div id="nota_ordine"></div>
                    <br> 
                    <div id="tempistica">  
                        <div class="form-group">
                            <label >Ordine da consegnare: *   </label><br/>
                            <div class="radio-inline col-lg-4">
                                <label><input type="radio" value="1" name="temp" id="temp" >Urgente</label>
                            </div>
                            <div class="radio-inline col-lg-4">
                              <label><input type="radio" value="2" name="temp" id="temp" checked>Entro il </label>
                            </div>
                            <div class="input-group date " id="datetimepicker1">
                                <input type='text' class="form-control "  id="dataTemp" name="dataTemp" readonly/> 
                                <span class="input-group-addon">  
                                    <span class="glyphicon glyphicon-calendar"></span> 
                                </span>
                            </div>
                        </div>
                    </div>    
                    <br> 
                    <div class="md-form">
                        <label for="note">Note</label>
                        <textarea  id="note" name="note" class="md-textarea form-control" rows="3"></textarea>
                    </div>
                    <br>
                    <label >    * Campi obbligatori</label>
                    <span class="alert1"></span>
                    <br>
                    <br>
                    <button type="submit"  class="btn btn-info  btn-block btn-large" id="invio"  value="Invio" disabled>Invio</button>
                </fieldset>
        
            </form>
            <div class="progress"></div>
            <div id="err"></div>
        </div>
    </div>
    <!-- Modal -->
    <div id="modal" class="modal fade">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                 
                    <h4 class="modal-title"></h4>
                </div>
                
                  
                   
               
                <div class="modal-body">
                     <h3 id="myModalLabel"></h3>
                   <textarea class="form-control" name="descriz" id="descriz" readonly rows="3"></textarea>
                   <img   class="img-fluid" id="image"> 
                </div>
                <div class="modal-footer">
                
                  
                </div>
            </div>
        </div>
    </div>    
</div>
